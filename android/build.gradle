group 'com.example.sim_country_code_plus'
version '1.0'

buildscript {
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:7.3.0'
    }
}

rootProject.allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: 'com.android.library'

android {
    namespace 'com.example.sim_country_code_plus'
    compileSdkVersion 33

    defaultConfig {
        minSdkVersion 16
    }
} 